esphome:
  min_version: 2023.6.0
  name: espsharan
  friendly_name: espSharan
  includes:
   - webasto.h
  on_boot:
    then:
      - switch.turn_off: schluessel_schalter_pwr
      - delay: 1000ms
      - switch.turn_on: schluessel_schalter_pwr

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  #level: DEBUG
  #level: WARN
  level: ERROR
  #baud_rate: 0 #disable logging over uart
  
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 192.168.1.156
    gateway: 192.168.1.254
    subnet: 255.255.255.0   

api:
  encryption:
    key: "BD7oYgph6lN0iAXuwh22MzvJORVGe+ZGwhR2K6ElwIQ="

ota:
  - platform: esphome
    password: "f6a56179190bf80773a1397cfaff6731"

output:
#eigene GebläseSteuerung    
  - platform: ledc
    pin: 19  # GPIO19
    id: pwm_luefter
    frequency: 400 Hz  # PWM Frequenz 400Hz
    inverted: false
light:
  - platform: monochromatic
    #name: "Lüfter"
    output: pwm_luefter
    id: luefter_light
    gamma_correct: 1
  # - platform: gpio
  #   pin: GPIO17
  #   inverted: true
  #   id: led

uart:
  id: uart_bus
  tx_pin: 22
  rx_pin: 21
  baud_rate: 2400
  parity: EVEN
  stop_bits: 1

custom_component:
- lambda: |-
    auto my_custom = new Webasto(id(uart_bus));
    return {my_custom};
  components:
    - id: my_custom_id
    
interval:
  - interval: 10s
    then:
      - if:
          condition:
            - lambda: "return id(remain).state > 0;"
          then:
            - number.decrement:
                id: remain
                cycle: false
      - if:
          condition:
            - lambda: "return id(remain).state < 0;"
          then:
            - number.set:
                id: remain
                value: 0
            - switch.turn_off: sw_heat
            - switch.turn_off: sw_vent
            - climate.control:
                id: my_thermostat
                mode: 'OFF'
      - if:
          condition:
            and:
              - lambda: |-
                  return id(geblaese_input).state > 2; //wenn Climatronic läuft
              - switch.is_on: sw_heat #und Zuheizer ist ein
          then:
            - switch.turn_off: geblaese_steuerung #aud Climatronic umschalten
            - light.turn_off: #eigene Gebläsesteuerung aus
                id: luefter_light
                transition_length: 1s  
      - if:
          condition:
            and:
              - lambda: |-
                  return id(geblaese_input).state < 2; //wenn Climatronic NICHT läuft
              - switch.is_on: sw_heat #und Zuheizer ist ein
              - switch.is_on: geblaese_steuerung # Gebläsesteuerung ist ein
              - lambda: |- 
                  return static_cast<Webasto*>(id(my_custom_id))->state_50_05.temperature > 70.0; 
              - lambda: |-
                  return id(luefter_light).current_values.get_brightness() < 0.11;
          then:
            - light.turn_on:
                id: luefter_light
                brightness: 11%
                transition_length: 0s            
            - light.turn_on:
                id: luefter_light
                brightness: 30%
                transition_length: 300s
      - if:
          condition:
            and:
              - lambda: |-
                  return id(geblaese_input).state < 2; //wenn Climatronic NICHT läuft
              - switch.is_on: sw_heat #und Zuheizer ist ein
              - switch.is_on: geblaese_steuerung # Gebläsesteuerung ist ein
              - lambda: |- #wenn wasser heißer als 40°
                  return static_cast<Webasto*>(id(my_custom_id))->state_50_05.temperature > 40.0;
              - light.is_off: luefter_light # nur wenn Lüfter-Licht aus ist
          then:
            - light.turn_on:
                id: luefter_light
                transition_length: 0s   



button:
  - platform: restart
    name: "Restart"
    
switch:
  - platform: template
    #name: "Lüften"
    optimistic: true
    id: sw_vent
    on_turn_on:
      - switch.turn_off: sw_heat
      - lambda: "static_cast<Webasto*>(id(my_custom_id))->VentOn();"
      - number.set:
              id: remain
              value: !lambda "return id(my_thermostat).mode>0 ? id(remain).state : id(runtime).state;"
    on_turn_off:
      - lambda: "static_cast<Webasto*>(id(my_custom_id))->Off();"
      - number.set:
              id: remain
              value: !lambda "return id(my_thermostat).mode>0 ? id(remain).state : 0;"


  - platform: template
    name: "Heizen"
    optimistic: true
    id: sw_heat
    on_turn_on:
      - switch.turn_off: sw_vent
      - lambda: "static_cast<Webasto*>(id(my_custom_id))->HeatOn();"
      - number.set:
              id: remain
              value: !lambda "return id(my_thermostat).mode>0 ? id(remain).state : id(runtime).state;"
      - switch.turn_on: geblaese_steuerung # auf eigene Gebläsesteuerung umstellen
      - delay: 200ms
      
      - if: # Prüfen ob Climatronic bereits Läuft
          condition: # wenn nicht
            lambda: |-
              return id(geblaese_input).state < 2; 
          then: # eigene Gebläsesteuerung aktivieren
            - light.turn_on:
                id: luefter_light
                brightness: 10%
                transition_length: 0s
            - light.turn_off:
                id: luefter_light
                transition_length: 0s
      - if:
          condition: # wenn Climatronic aktiv
            lambda: |-
              return id(geblaese_input).state > 2;
          then: # auf Climatronic Gebläsesteuerung umstellen und eigene deaktivieren
            - switch.turn_off: geblaese_steuerung
            - light.turn_off:
                id: luefter_light
                transition_length: 1s         
    on_turn_off:
      - lambda: "static_cast<Webasto*>(id(my_custom_id))->Off();"
      - number.set:
              id: remain
              value: !lambda "return id(my_thermostat).mode>0 ? id(remain).state : 0;" 
      - switch.turn_off: schluessel_schalter_pwr    #Schlüsselschalter reset
      - delay: 200ms
      - switch.turn_on: schluessel_schalter_pwr     #Schlüsselschalter reset
      - switch.turn_off: geblaese_steuerung         #eigene Gebläsesteuerung    
      - light.turn_on:
          id: luefter_light
          brightness: 0%
          transition_length: 5s  

  - platform: gpio
    #name: "Gebläsesteuerung"
    pin: GPIO25
    id: geblaese_steuerung
    restore_mode: RESTORE_DEFAULT_OFF


  - platform: gpio
    #name: "LIN Modul"
    pin: GPIO23
    id: gpio23_switch
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    #name: "Schlüsselschalter Power"
    pin: GPIO32
    id: schluessel_schalter_pwr
    restore_mode: RESTORE_DEFAULT_ON


number:
  - platform: template
    #name: "Verbleibend"
    icon: mdi:timer-sand
    id: remain
    initial_value: 0
    step: 0.1
    min_value: -0.5
    max_value: 1440
    unit_of_measurement: 'min'
    mode: box
    optimistic: true

  - platform: template
    name: "Laufzeit"
    icon: mdi:timer
    id: runtime
    restore_value: false
    initial_value: 30
    step: 5
    min_value: 0
    max_value: 60
    unit_of_measurement: 'min'
    mode: box
    optimistic: true

sensor:
  - platform: template
    name: "Verbleibend"
    id: remain_sensor
    icon: mdi:timer-sand
    unit_of_measurement: "min"
    update_interval: 1s
    lambda: |-
      return id(remain).state;

  - platform: wifi_signal
    name: "WLAN Signalstärke"
    icon: mdi:wifi

  - platform: template
    #name: "Temperatur"
    icon: mdi:thermometer
    id: temp
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      return 14.0;

  - platform: template
    #name: "Luftfeuchtigkeit"
    icon: mdi:water-percent
    id: humi
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      return 50.0;

  - platform: template
    name: "Gebläse PWM"
    icon: mdi:fan
    unit_of_measurement: "%"
    update_interval: 200ms
    lambda: |-
      if (id(luefter_light).current_values.is_on()) {
        return id(luefter_light).current_values.get_brightness() * 100.0;
      } else {
        return 0.0;
      }

  # Input von Climatronic-Gebläse
  - platform: adc
    pin: GPIO39
    #name: "Gebläse Eingang"
    icon: mdi:fan-chevron-up
    id: geblaese_input
    update_interval: 5000ms
    attenuation: 12dB
    unit_of_measurement: "%"
    samples: 3
    filters:
       - offset: -0.32
       - multiply: 41.07

  - platform: template
    name: "Betriebsstunden (Heizung aktiv)"
    icon: mdi:timer-outline
    lambda: "return static_cast<Webasto*>(id(my_custom_id))->state_50_06.working_hours;"
    unit_of_measurement: "h"
    accuracy_decimals: 2
    update_interval: 30s

  - platform: template
    name: "Gesamtbetriebsstunden"
    icon: mdi:timer
    lambda: "return static_cast<Webasto*>(id(my_custom_id))->state_50_06.operating_hours;"
    unit_of_measurement: "h"
    accuracy_decimals: 2
    update_interval: 30s

  - platform: template
    name: "Startzähler"
    icon: mdi:counter
    lambda: "return static_cast<Webasto*>(id(my_custom_id))->state_50_06.start_counter;"
    unit_of_measurement: "-"
    accuracy_decimals: 0
    update_interval: 30s

  - platform: template
    name: "Wassertemperatur"
    icon: mdi:thermometer-water
    lambda: "return static_cast<Webasto*>(id(my_custom_id))->state_50_05.temperature;"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 5s

  - platform: template
    name: "Batteriespannung"
    icon: mdi:car-battery
    lambda: "return static_cast<Webasto*>(id(my_custom_id))->state_50_05.voltage;"
    unit_of_measurement: "V"
    accuracy_decimals: 1
    update_interval: 5s

  # - platform: template
  #   name: "Betriebszustand"
  #   icon: mdi:cog
  #   lambda: "return static_cast<Webasto*>(id(my_custom_id))->state_50_07.op_state;"
  #   unit_of_measurement: "-"
  #   accuracy_decimals: 0
  #   update_interval: 5s


binary_sensor:
  - platform: template
    name: "Verbrennungslüfter"
    icon: mdi:fan
    lambda: "return static_cast<Webasto*>(id(my_custom_id))->state_50_03.combustion_fan;"

  - platform: template
    name: "Glühkerze"
    icon: mdi:fire
    lambda: "return static_cast<Webasto*>(id(my_custom_id))->state_50_03.glowplug;"

  - platform: template
    name: "Kraftstoffpumpe"
    icon: mdi:fuel
    lambda: "return static_cast<Webasto*>(id(my_custom_id))->state_50_03.fuel_pump;"

  - platform: template
    name: "Zirkulationspumpe"
    icon: mdi:pump
    lambda: "return static_cast<Webasto*>(id(my_custom_id))->state_50_03.circulation_pump;"

  - platform: gpio
    pin:
      number: GPIO33
      mode: INPUT_PULLUP
      inverted: true
    name: "Schlüsselschalter"
    icon: mdi:key
    on_press:
      - switch.turn_on: sw_heat
    on_release:
      - switch.turn_off: sw_heat
                         
climate:
  - platform: thermostat
    #name: "Thermostat"
    id: my_thermostat
    on_boot_restore_from: memory
    sensor: temp
    visual:
      min_temperature: 0
      max_temperature: 40
      temperature_step : 0.5
    min_cooling_off_time: 30s
    min_cooling_run_time: 30s
    min_heating_off_time: 30s
    min_heating_run_time: 30s
    min_idle_time: 30s
    cool_deadband: 0.5
    cool_overrun: 0.5
    heat_deadband: 0.5
    heat_overrun: 0.5
    set_point_minimum_differential: 3
    cool_action:
      - switch.turn_on: sw_vent
    heat_action:
      - switch.turn_on: sw_heat
    idle_action:
      - switch.turn_off: sw_vent
      - switch.turn_off: sw_heat
    on_control:
      - delay: 1s
      - number.set:
          id: remain
          value: !lambda "return id(my_thermostat).mode>0 ? id(runtime).state*60 : 0;"
       
